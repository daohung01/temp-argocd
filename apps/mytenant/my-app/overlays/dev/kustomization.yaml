apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
# No infisicalsecret.yaml, secret-patch.yaml, or configmap-patch with credentials
nameSuffix: -dev
namespace: mytenant
images:
  - name: 032794943726.dkr.ecr.ap-southeast-1.amazonaws.com/mytenant/my-app
    newTag: latest
patches:
  - patch: |-
      - op: replace
        path: /spec/hosts
        value:
          - my-app.dev.example.com
      - op: replace
        path: /spec/http/0/route/0/destination/host
        value: my-app-dev.mytenant.svc.cluster.local
    target:
      kind: VirtualService
      name: my-app
      namespace: istio-system
# Optional: patch ConfigMap for env-specific non-secret values only (no SECRET, PASSWORD, etc.)
# - patch: |-
#     - op: replace
#       path: /data/LOG_LEVEL
#       value: "debug"
#   target:
#     kind: ConfigMap
#     name: my-app-config
