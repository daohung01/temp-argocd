apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
nameSuffix: -dev
namespace: mytenant
images:
  - name: 032794943726.dkr.ecr.ap-southeast-1.amazonaws.com/mytenant/my-api
    newTag: latest
patches:
  - patch: |-
      - op: replace
        path: /spec/hosts
        value:
          - my-api.dev.example.com
      - op: replace
        path: /spec/http/0/route/0/destination/host
        value: my-api-dev.mytenant.svc.cluster.local
    target:
      kind: VirtualService
      name: my-api
      namespace: istio-system
