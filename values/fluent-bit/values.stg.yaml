# Fluent Bit Helm values for stg (no secrets). Deployed to namespace logging-stg.
# For OpenSearch: create Secret "opensearch-credentials" in namespace logging-stg and set envFrom in the Application.
rbac:
  create: true
  nodeAccess: true

serviceAccount:
  create: true
  name: fluent-bit

env:
  - name: OPENSEARCH_HOST
    value: "opensearch.example.com"
  - name: OPENSEARCH_PORT
    value: "443"
  - name: OPENSEARCH_INDEX_PREFIX
    value: "labci-stg"

config:
  inputs: |
    [INPUT]
        Name tail
        Path /var/log/containers/*.log
        multiline.parser docker, cri
        Tag kube.*
        Mem_Buf_Limit 10MB
        Skip_Long_Lines On
  filters: |
    [FILTER]
        Name kubernetes
        Match kube.*
        Merge_Log On
        Keep_Log Off
        K8S-Logging.Parser On
        K8S-Logging.Exclude On
  outputs: |
    [OUTPUT]
        Name stdout
        Match *
