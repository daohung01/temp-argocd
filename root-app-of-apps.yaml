# Root Application (App-of-Apps)
# Apply this file once, ArgoCD will discover and manage child Application/ApplicationSet manifests under appsets/.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-nginx
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/daohung01/temp-argocd.git
    targetRevision: main
    path: app/mytenant/nginx-app
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: mytenant
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
