# ApplicationSet template — copy to e.g. labci-dev-<tenant>-appset.yml
# Path apps/<tenant>/*/overlays/dev → segments: 0=apps, 1=tenant, 2=app-name, 3=overlays, 4=dev
# Application name (matches existing): app-name + "-" + overlay = segment2-segment4
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: labci-dev-<tenant>-appset
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://gitlab.labci.com/labci/ops/argocd-deployment/labci/apps-deployments.git
        revision: HEAD
        directories:
          - path: apps/<tenant>/*/overlays/dev
  template:
    metadata:
      name: '{{index .path.segments 2}}-{{index .path.segments 4}}'
    spec:
      project: labci-dev-apps-project

      source:
        repoURL: https://gitlab.labci.com/labci/ops/argocd-deployment/labci/apps-deployments.git
        targetRevision: HEAD
        path: '{{.path.path}}'

      destination:
        server: https://kubernetes.default.svc
        namespace: '<target-namespace>'

      syncPolicy:
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
        automated:
          prune: true
          selfHeal: false
