# Logging: Fluent Bit for DEV. Managed from ops ArgoCD, deployed per env (same pattern as Prometheus).
# Single cluster: namespace logging-dev. Multi-cluster: set destination.server to dev cluster API.
# No secrets in template; add OpenSearch credentials via Secret in logging-dev when needed.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fluent-bit-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: labci-dev-apps-project
  source:
    repoURL: https://fluent.github.io/helm-charts
    chart: fluent-bit
    targetRevision: 0.55.0
    helm:
      releaseName: fluent-bit
      valueFiles: []
      values: |
        rbac:
          create: true
          nodeAccess: true
        serviceAccount:
          create: true
          name: fluent-bit
        # Non-secret env only. Add Secret opensearch-credentials in logging-dev
        # with OPENSEARCH_USERNAME, OPENSEARCH_PASSWORD and set envFrom in real env.
        env: []
        # envFrom:
        #   - secretRef:
        #       name: opensearch-credentials
        #       optional: true
        config:
          inputs: |
            [INPUT]
                Name tail
                Path /var/log/containers/*.log
                multiline.parser docker, cri
                Tag kube.*
                Mem_Buf_Limit 10MB
                Skip_Long_Lines On
          filters: |
            [FILTER]
                Name kubernetes
                Match kube.*
                Merge_Log On
                Keep_Log Off
                K8S-Logging.Parser On
                K8S-Logging.Exclude On
          outputs: |
            [OUTPUT]
                Name stdout
                Match *
          # Add es output with OPENSEARCH_* and credentials in real env
  destination:
    server: https://kubernetes.default.svc
    namespace: logging-dev
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    automated:
      prune: true
      selfHeal: true
